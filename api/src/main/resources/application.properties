spring.application.name=api

# Local PostgreSQL configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/java_api
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=java_api_user
spring.datasource.password=JavaApi@2026!

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger

app.jwt.secret=change-me-to-a-very-long-secret-key-with-at-least-32-bytes
app.jwt.expiration-seconds=7200
